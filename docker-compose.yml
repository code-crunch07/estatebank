services:
  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        MONGODB_URI: ${MONGODB_URI:-mongodb://admin:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-estatebank}?authSource=admin}
    container_name: estatebank-app
    restart: unless-stopped
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - PORT=3002
      # Inside the container uploads must live under /app — do NOT pass host paths from .env here.
      # Mount your host folder to /app/public/uploads (see volumes below).
      - UPLOAD_PATH=/app/public/uploads
      - MONGODB_URI=${MONGODB_URI:-mongodb://admin:${MONGO_ROOT_PASSWORD}@mongodb:27017/${MONGO_DATABASE:-estatebank}?authSource=admin}
      - JWT_SECRET=${JWT_SECRET}
      - BREVO_SMTP_HOST=${BREVO_SMTP_HOST}
      - BREVO_SMTP_PORT=${BREVO_SMTP_PORT}
      - BREVO_SMTP_USER=${BREVO_SMTP_USER}
      - BREVO_SMTP_PASSWORD=${BREVO_SMTP_PASSWORD}
      - BREVO_FROM_EMAIL=${BREVO_FROM_EMAIL}
      - BREVO_FROM_NAME=${BREVO_FROM_NAME}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_NAME_CREATE=${ADMIN_NAME_CREATE}
      - ADMIN_PASSWORD_CREATE=${ADMIN_PASSWORD_CREATE}
      - ADMIN_CREATE_SECRET=${ADMIN_CREATE_SECRET}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
    env_file:
      - .env
    # Persist uploads: set UPLOADS_HOST_PATH in .env to your server path, or use default ./data/uploads
    volumes:
      - ${UPLOADS_HOST_PATH:-./data/uploads}:/app/public/uploads
    networks:
      - estatebank-network
    healthcheck:
      test: ["CMD", "node", "healthcheck.js"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MongoDB Service
  mongodb:
    image: mongo:7
    container_name: estatebank-mongodb
    restart: unless-stopped
    # ports:
    #   - "27017:27017"
    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_ROOT_USERNAME:-admin}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_ROOT_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DATABASE:-estatebank}
    volumes:
      - mongodb_data:/data/db
    networks:
      - estatebank-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Nginx Reverse Proxy (Optional - for production)
  # nginx:
  #   image: nginx:alpine
  #   container_name: estatebank-nginx
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./ssl:/etc/nginx/ssl:ro
  #   depends_on:
  #     - app
  #   networks:
  #     - estatebank-network

networks:
  estatebank-network:
    driver: bridge

volumes:
  mongodb_data:

